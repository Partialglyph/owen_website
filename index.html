      const revealAll = () => {
        const newRevealed = { ...revealedAnswers };
        studyData[activeCategory].questions.forEach((_, qi) => { newRevealed[`${activeCategory}-${qi}`] = true; });
        setRevealedAnswers(newRevealed);
      };

      const hideAll = () => {
        const newRevealed = { ...revealedAnswers };
        studyData[activeCategory].questions.forEach((_, qi) => { newRevealed[`${activeCategory}-${qi}`] = false; });
        setRevealedAnswers(newRevealed);
      };

      const startQuiz = (count = 20) => {
        const all = studyData.flatMap((cat, ci) =>
          cat.questions.map((q, qi) => ({ ...q, category: cat.category, icon: cat.icon, key: `${ci}-${qi}` }))
        );
        const shuffled = [...all].sort(() => Math.random() - 0.5).slice(0, count);
        setQuizQuestions(shuffled);
        setQuizIndex(0);
        setQuizRevealed(false);
        setScore({ correct: 0, total: 0 });
        setQuizMode(true);
      };

      const startCategoryQuiz = (catIndex) => {
        const cat = studyData[catIndex];
        const shuffled = [...cat.questions]
          .map((q, qi) => ({ ...q, category: cat.category, icon: cat.icon, key: `${catIndex}-${qi}` }))
          .sort(() => Math.random() - 0.5);
        setQuizQuestions(shuffled);
        setQuizIndex(0);
        setQuizRevealed(false);
        setScore({ correct: 0, total: 0 });
        setQuizMode(true);
      };

      const markQuiz = (gotIt) => {
        setScore((prev) => ({ correct: prev.correct + (gotIt ? 1 : 0), total: prev.total + 1 }));
        if (quizIndex < quizQuestions.length - 1) {
          setQuizIndex((i) => i + 1);
          setQuizRevealed(false);
        } else {
          setQuizIndex(-1);
        }
      };

      const currentCat = studyData[activeCategory];

      return (
        <div style={{ fontFamily: "'Georgia', 'Times New Roman', serif", minHeight: "100vh", background: "#0f1114", color: "#e8e4dc", padding: 0, margin: 0 }}>
          {/* Header */}
          <div style={{ borderBottom: "1px solid rgba(255,255,255,0.08)", padding: "24px 20px 18px", background: "linear-gradient(180deg, rgba(200,16,46,0.08) 0%, transparent 100%)" }}>
            <div style={{ fontSize: 11, letterSpacing: 3, textTransform: "uppercase", color: "#c8102e", fontFamily: "system-ui, sans-serif", fontWeight: 600, marginBottom: 6 }}>
              St. John Ambulance — Drill Study Guide
            </div>
            <h1 style={{ fontSize: 24, fontWeight: 400, margin: "4px 0 4px", letterSpacing: -0.3, lineHeight: 1.2 }}>
              Basic Drill Manual
              <span style={{ fontSize: 14, color: "rgba(232,228,220,0.4)", fontStyle: "italic", marginLeft: 10 }}>{totalQuestions} questions</span>
            </h1>
            <div style={{ display: "flex", gap: 8, marginTop: 14, flexWrap: "wrap" }}>
              <button onClick={() => setQuizMode(false)} style={{ padding: "7px 16px", fontSize: 13, fontFamily: "system-ui, sans-serif", border: !quizMode ? "1px solid #c8102e" : "1px solid rgba(255,255,255,0.08)", background: !quizMode ? "rgba(200,16,46,0.15)" : "transparent", color: !quizMode ? "#c8102e" : "rgba(232,228,220,0.45)", borderRadius: 6, cursor: "pointer", fontWeight: 600 }}>📖 Study</button>
              <button onClick={() => startQuiz(20)} style={{ padding: "7px 16px", fontSize: 13, fontFamily: "system-ui, sans-serif", border: quizMode ? "1px solid #d4a843" : "1px solid rgba(255,255,255,0.08)", background: quizMode ? "rgba(212,168,67,0.15)" : "transparent", color: quizMode ? "#d4a843" : "rgba(232,228,220,0.45)", borderRadius: 6, cursor: "pointer", fontWeight: 600 }}>🎯 Quiz (20 Random)</button>
            </div>
          </div>

          {!quizMode ? (
            <div style={{ display: "flex", minHeight: "calc(100vh - 130px)" }}>
              {/* Sidebar */}
              <div style={{ width: 230, minWidth: 230, borderRight: "1px solid rgba(255,255,255,0.08)", padding: "10px 0", overflowY: "auto", maxHeight: "calc(100vh - 130px)" }}>
                {studyData.map((cat, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center" }}>
                    <button onClick={() => setActiveCategory(i)} style={{ display: "flex", alignItems: "center", gap: 8, flex: 1, padding: "9px 14px", border: "none", background: i === activeCategory ? "rgba(200,16,46,0.1)" : "transparent", borderLeft: i === activeCategory ? "3px solid #c8102e" : "3px solid transparent", color: i === activeCategory ? "#fff" : "rgba(232,228,220,0.5)", cursor: "pointer", fontSize: 12.5, fontFamily: "system-ui, sans-serif", textAlign: "left" }}>
                      <span style={{ fontSize: 14 }}>{cat.icon}</span>
                      <span style={{ flex: 1 }}>{cat.category}</span>
                      <span style={{ fontSize: 10, background: "rgba(255,255,255,0.05)", padding: "1px 6px", borderRadius: 8, color: "rgba(232,228,220,0.3)" }}>{cat.questions.length}</span>
                    </button>
                    <button onClick={() => startCategoryQuiz(i)} title={`Quiz: ${cat.category}`} style={{ padding: "4px 8px", border: "none", background: "transparent", color: "rgba(232,228,220,0.2)", cursor: "pointer", fontSize: 12, fontFamily: "system-ui", marginRight: 4 }}>🎯</button>
                  </div>
                ))}
              </div>

              {/* Main */}
              <div style={{ flex: 1, padding: "18px 24px", overflowY: "auto", maxHeight: "calc(100vh - 130px)" }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 18 }}>
                  <h2 style={{ fontSize: 18, fontWeight: 400, margin: 0, display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontSize: 22 }}>{currentCat.icon}</span>
                    {currentCat.category}
                  </h2>
                  <div style={{ display: "flex", gap: 8 }}>
                    <button onClick={revealAll} style={{ padding: "4px 12px", fontSize: 11, fontFamily: "system-ui", border: "1px solid rgba(255,255,255,0.08)", background: "transparent", color: "rgba(232,228,220,0.4)", borderRadius: 5, cursor: "pointer" }}>Show All</button>
                    <button onClick={hideAll} style={{ padding: "4px 12px", fontSize: 11, fontFamily: "system-ui", border: "1px solid rgba(255,255,255,0.08)", background: "transparent", color: "rgba(232,228,220,0.4)", borderRadius: 5, cursor: "pointer" }}>Hide All</button>
                  </div>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  {currentCat.questions.map((item, qi) => {
                    const key = `${activeCategory}-${qi}`;
                    const revealed = revealedAnswers[key];
                    return (
                      <div key={qi} onClick={() => toggleAnswer(qi)} style={{ background: revealed ? "rgba(200,16,46,0.03)" : "rgba(255,255,255,0.03)", border: `1px solid ${revealed ? "rgba(200,16,46,0.15)" : "rgba(255,255,255,0.06)"}`, borderRadius: 8, padding: "14px 18px", cursor: "pointer", transition: "all 0.15s" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 10 }}>
                          <p style={{ margin: 0, fontSize: 13.5, lineHeight: 1.5, fontFamily: "system-ui, sans-serif", fontWeight: 500, color: "#fff" }}>
                            <span style={{ color: "#c8102e", marginRight: 7, fontSize: 11, fontWeight: 700 }}>Q{qi + 1}</span>
                            {item.q}
                          </p>
                          <span style={{ fontSize: 10, color: "rgba(232,228,220,0.25)", fontFamily: "system-ui", whiteSpace: "nowrap", marginTop: 2 }}>{revealed ? "▲" : "▼"}</span>
                        </div>
                        {revealed && (
                          <div style={{ marginTop: 12, paddingTop: 12, borderTop: "1px solid rgba(255,255,255,0.05)" }}>
                            <p style={{ margin: 0, fontSize: 13.5, lineHeight: 1.6, color: "rgba(232,228,220,0.75)", fontFamily: "system-ui, sans-serif" }}>{item.a}</p>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          ) : (
            <div style={{ maxWidth: 600, margin: "0 auto", padding: "28px 20px" }}>
              {quizIndex === -1 ? (
                <div style={{ textAlign: "center", paddingTop: 36 }}>
                  <div style={{ fontSize: 44, marginBottom: 14 }}>{score.correct / score.total >= 0.8 ? "🎖️" : score.correct / score.total >= 0.5 ? "📋" : "📖"}</div>
                  <h2 style={{ fontSize: 26, fontWeight: 400, margin: "0 0 6px" }}>{score.correct} / {score.total}</h2>
                  <p style={{ color: "rgba(232,228,220,0.45)", fontFamily: "system-ui", fontSize: 13, margin: "0 0 28px" }}>
                    {score.correct / score.total >= 0.8 ? "Excellent drill knowledge!" : score.correct / score.total >= 0.5 ? "Good effort — review the areas you missed." : "Keep studying — you'll get there."}
                  </p>
                  <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap" }}>
                    <button onClick={() => startQuiz(20)} style={{ padding: "10px 24px", fontSize: 13, fontFamily: "system-ui", border: "1px solid #c8102e", background: "rgba(200,16,46,0.15)", color: "#c8102e", borderRadius: 7, cursor: "pointer", fontWeight: 600 }}>Try Again (20)</button>
                    <button onClick={() => startQuiz(totalQuestions)} style={{ padding: "10px 24px", fontSize: 13, fontFamily: "system-ui", border: "1px solid #d4a843", background: "rgba(212,168,67,0.1)", color: "#d4a843", borderRadius: 7, cursor: "pointer", fontWeight: 600 }}>Full Test ({totalQuestions})</button>
                    <button onClick={() => setQuizMode(false)} style={{ padding: "10px 24px", fontSize: 13, fontFamily: "system-ui", border: "1px solid rgba(255,255,255,0.08)", background: "transparent", color: "rgba(232,228,220,0.5)", borderRadius: 7, cursor: "pointer" }}>Back to Study</button>
                  </div>
                </div>
              ) : (
                <>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20, fontFamily: "system-ui", fontSize: 12, color: "rgba(232,228,220,0.35)" }}>
                    <span>Question {quizIndex + 1} / {quizQuestions.length}</span>
                    <span style={{ color: "#d4a843" }}>✓ {score.correct} / {score.total}</span>
                  </div>
                  <div style={{ height: 3, background: "rgba(255,255,255,0.05)", borderRadius: 3, marginBottom: 28, overflow: "hidden" }}>
                    <div style={{ height: "100%", width: `${(quizIndex / quizQuestions.length) * 100}%`, background: "#c8102e", borderRadius: 3, transition: "width 0.3s" }} />
                  </div>
                  <div style={{ fontSize: 10, color: "rgba(232,228,220,0.25)", fontFamily: "system-ui", textTransform: "uppercase", letterSpacing: 2, marginBottom: 8 }}>
                    {quizQuestions[quizIndex].icon} {quizQuestions[quizIndex].category}
                  </div>
                  <h3 style={{ fontSize: 17, fontWeight: 400, lineHeight: 1.5, margin: "0 0 24px", fontFamily: "system-ui, sans-serif" }}>
                    {quizQuestions[quizIndex].q}
                  </h3>
                  {!quizRevealed ? (
                    <button onClick={() => setQuizRevealed(true)} style={{ padding: "12px 28px", fontSize: 13, fontFamily: "system-ui", border: "1px solid #d4a843", background: "rgba(212,168,67,0.08)", color: "#d4a843", borderRadius: 7, cursor: "pointer", fontWeight: 600, width: "100%" }}>Reveal Answer</button>
                  ) : (
                    <>
                      <div style={{ background: "rgba(212,168,67,0.05)", border: "1px solid rgba(212,168,67,0.12)", borderRadius: 8, padding: "16px 20px", marginBottom: 20 }}>
                        <p style={{ margin: 0, fontSize: 13.5, lineHeight: 1.6, color: "rgba(232,228,220,0.8)", fontFamily: "system-ui, sans-serif" }}>{quizQuestions[quizIndex].a}</p>
                      </div>
                      <div style={{ display: "flex", gap: 10 }}>
                        <button onClick={() => markQuiz(true)} style={{ flex: 1, padding: "12px 20px", fontSize: 13, fontFamily: "system-ui", border: "1px solid rgba(76,175,80,0.35)", background: "rgba(76,175,80,0.08)", color: "#81c784", borderRadius: 7, cursor: "pointer", fontWeight: 600 }}>✓ Got It</button>
                        <button onClick={() => markQuiz(false)} style={{ flex: 1, padding: "12px 20px", fontSize: 13, fontFamily: "system-ui", border: "1px solid rgba(244,67,54,0.25)", background: "rgba(244,67,54,0.06)", color: "#e57373", borderRadius: 7, cursor: "pointer", fontWeight: 600 }}>✗ Missed It</button>
                      </div>
                    </>
                  )}
                </>
              )}
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<DrillStudyGuide />);
  </script>
</body>
</html>
