<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summer Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
  :root {
    --bg:#0d0d0f; --bg1:#131316; --bg2:#1a1a1f; --bg3:#222228;
    --border:rgba(255,255,255,0.07); --border-hi:rgba(255,255,255,0.13);
    --text:#e8e8ec; --muted:#6b6b7a; --dim:#3a3a46;
    --phys:#f0a030; --math:#8b78f0; --chem:#2db87a; --geo:#e06040;
    --chin:#d45880; --deb:#4a9ef0; --kayak:#2080d0; --mock:#c060e0;
    --radius:8px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;line-height:1.5}
  .app{max-width:900px;margin:0 auto;padding:2rem 1.25rem 4rem}

  /* Header */
  .header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:2rem;gap:1rem;flex-wrap:wrap}
  .header-left h1{font-size:22px;font-weight:600;letter-spacing:-0.02em}
  .header-left p{color:var(--muted);font-size:13px;margin-top:2px;font-family:'JetBrains Mono',monospace}
  .today-btn{background:var(--bg3);border:0.5px solid var(--border-hi);color:var(--text);font-size:12px;font-family:'JetBrains Mono',monospace;padding:6px 14px;border-radius:var(--radius);cursor:pointer;transition:border-color .15s}
  .today-btn:hover{border-color:rgba(255,255,255,0.22)}

  /* Week strip */
  .week-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:1.75rem}
  .day-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--bg1);cursor:pointer;transition:all .15s;position:relative}
  .day-btn:hover{border-color:var(--border-hi);background:var(--bg2)}
  .day-btn.active{border-color:rgba(255,255,255,0.25);background:var(--bg2)}
  .day-btn.today .day-num{color:var(--deb)}
  .day-name{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.06em}
  .day-num{font-size:16px;font-weight:500}
  .day-pip{display:block;width:5px;height:5px;border-radius:50%}
  .day-progress{position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--border);border-radius:0 0 var(--radius) var(--radius);overflow:hidden}
  .day-progress-fill{height:100%;background:var(--chem);transition:width .3s}

  /* Stats */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.75rem}
  .stat{background:var(--bg1);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 14px}
  .stat-label{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
  .stat-value{font-size:20px;font-weight:600;font-family:'JetBrains Mono',monospace}

  .section-label{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}

  /* Blocks */
  .blocks{display:flex;flex-direction:column;gap:5px;margin-bottom:1.75rem}
  .block{border-radius:var(--radius);border:0.5px solid var(--border);overflow:hidden;transition:border-color .15s}
  .block:not(.passive){cursor:pointer}
  .block:not(.passive):hover{border-color:var(--border-hi)}
  .block.done{opacity:.4}
  .block.expanded{border-color:var(--border-hi)}
  .block.mock-block{border-color:rgba(192,96,224,0.25)}
  .block.mock-block:hover{border-color:rgba(192,96,224,0.5)}

  .block-header{display:flex;align-items:stretch}
  .block-accent{width:3px;flex-shrink:0}
  .block-time{width:88px;flex-shrink:0;padding:10px 12px;background:var(--bg1);color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;display:flex;align-items:center;border-right:0.5px solid var(--border)}
  .block-body{padding:10px 14px;flex:1;background:var(--bg2);display:flex;align-items:center;justify-content:space-between;gap:12px}
  .block-text{flex:1}
  .block-label{font-weight:500;font-size:13px}
  .block-note{font-size:12px;color:var(--muted);margin-top:1px}
  .block-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .expand-btn{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;background:none;border:none;cursor:pointer;padding:2px 0;transition:color .15s;white-space:nowrap}
  .expand-btn:hover{color:var(--text)}
  .block.expanded .expand-btn{color:var(--text)}
  .block-check{width:18px;height:18px;flex-shrink:0;border:1.5px solid var(--dim);border-radius:4px;display:flex;align-items:center;justify-content:center;transition:all .15s}
  .block.done .block-check{background:var(--chem);border-color:var(--chem)}
  .checkmark{display:none}
  .block.done .checkmark{display:block}
  .block.passive{cursor:default;opacity:.45}
  .block.passive:hover{border-color:var(--border)}
  .block.passive .block-check,.block.passive .expand-btn{display:none}
  .block.now{border-color:rgba(74,158,240,0.4);box-shadow:0 0 0 1px rgba(74,158,240,0.1)}
  .now-line{display:flex;align-items:center;gap:8px;margin:2px 0;padding:0 4px}
  .now-line-dot{width:7px;height:7px;border-radius:50%;background:var(--deb);flex-shrink:0}
  .now-line-bar{flex:1;height:1px;background:var(--deb);opacity:.4}
  .now-line-time{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--deb);white-space:nowrap}

  /* Mock exam badge */
  .mock-badge{font-size:10px;font-family:'JetBrains Mono',monospace;padding:2px 7px;border-radius:3px;background:rgba(192,96,224,0.15);color:var(--mock);flex-shrink:0}

  /* Mock subject picker */
  .mock-picker{padding:12px 14px 12px 105px;background:var(--bg1);border-top:0.5px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .mock-picker-label{font-size:12px;color:var(--muted)}
  .mock-subject-btn{font-size:12px;padding:4px 10px;border-radius:5px;border:0.5px solid var(--border);background:var(--bg2);color:var(--muted);cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .15s}
  .mock-subject-btn:hover{border-color:var(--border-hi);color:var(--text)}
  .mock-subject-btn.selected{color:#fff;border-color:transparent}

  /* Expanded task panel */
  .block-tasks{display:none;background:var(--bg1);border-top:0.5px solid var(--border);padding:14px 14px 14px 105px}
  .block.expanded .block-tasks{display:block}
  .task-section{margin-bottom:14px}
  .task-section:last-child{margin-bottom:0}
  .task-section-title{font-size:10px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:7px}
  .task-list{display:flex;flex-direction:column;gap:5px}
  .task-item{display:flex;align-items:flex-start;gap:9px;font-size:12px;line-height:1.55;color:var(--text);cursor:pointer;padding:5px 8px;border-radius:5px;border:0.5px solid transparent;transition:border-color .12s,background .12s;user-select:none}
  .task-item:hover{background:var(--bg2);border-color:var(--border)}
  .task-item.task-done{opacity:.35}
  .task-item.task-done .task-text{text-decoration:line-through}
  .task-cb{width:14px;height:14px;flex-shrink:0;margin-top:1px;border:1px solid var(--dim);border-radius:3px;display:flex;align-items:center;justify-content:center;transition:all .12s}
  .task-item.task-done .task-cb{background:var(--chem);border-color:var(--chem)}
  .task-check-sm{display:none}
  .task-item.task-done .task-check-sm{display:block}
  .task-text{flex:1}
  .task-tag{font-size:10px;font-family:'JetBrains Mono',monospace;padding:2px 6px;border-radius:3px;flex-shrink:0;margin-top:1px}
  .tag-sim{background:rgba(240,160,48,.15);color:#f0a030}
  .tag-drill{background:rgba(74,158,240,.15);color:#4a9ef0}
  .tag-review{background:rgba(139,120,240,.15);color:#8b78f0}
  .tag-vocab{background:rgba(212,88,128,.15);color:#d45880}
  .tag-essay{background:rgba(224,96,64,.15);color:#e06040}
  .tag-error{background:rgba(45,184,122,.15);color:#2db87a}
  .tag-mock{background:rgba(192,96,224,.15);color:#c060e0}
  .task-note{font-size:11px;color:var(--muted);line-height:1.5;padding:6px 8px;margin-top:2px;border-left:2px solid var(--dim)}

  /* Notes */
  .notes-area{width:100%;background:var(--bg1);border:0.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;padding:12px 14px;resize:vertical;min-height:80px;outline:none;transition:border-color .15s;line-height:1.6}
  .notes-area:focus{border-color:var(--border-hi)}
  .notes-area::placeholder{color:var(--dim)}

  /* Subject totals */
  .subjects{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:6px;margin-top:1.75rem}
  .subject-card{background:var(--bg1);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 12px;display:flex;align-items:center;gap:8px}
  .subject-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .subject-name{font-size:12px;color:var(--muted);flex:1}
  .subject-count{font-size:12px;font-family:'JetBrains Mono',monospace;font-weight:500}

  /* Streak */
  .streak-row{display:flex;align-items:center;gap:8px;margin-top:1.75rem}
  .streak-dots{display:flex;gap:4px;flex:1;flex-wrap:wrap}
  .streak-dot{width:10px;height:10px;border-radius:50%;background:var(--bg3);border:0.5px solid var(--border);flex-shrink:0}
  .streak-dot.hit{background:var(--chem);border-color:var(--chem)}
  .streak-dot.partial{background:var(--phys);border-color:var(--phys)}
  .streak-label{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;white-space:nowrap}

  @media(max-width:580px){
    .stats{grid-template-columns:repeat(2,1fr)}
    .week-strip{gap:3px}
    .day-num{font-size:14px}
    .block-tasks,.mock-picker{padding-left:14px}
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-left">
      <h1>Summer Tracker</h1>
      <p id="header-date">loading...</p>
    </div>
    <button class="today-btn" onclick="goToday()">→ today</button>
  </div>

  <div class="week-strip" id="week-strip"></div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Today</div><div class="stat-value" id="stat-today">0/0</div></div>
    <div class="stat"><div class="stat-label">Week</div><div class="stat-value" id="stat-week">0%</div></div>
    <div class="stat"><div class="stat-label">Streak</div><div class="stat-value" id="stat-streak">0d</div></div>
    <div class="stat"><div class="stat-label">Kayaks</div><div class="stat-value" id="stat-kayak">0</div></div>
  </div>

  <div class="section-label" id="day-label">Monday</div>
  <div class="blocks" id="blocks"></div>

  <div class="section-label" style="margin-top:1.25rem">Notes</div>
  <textarea class="notes-area" id="notes" placeholder="errors made, things that clicked, what to revisit..."></textarea>

  <div class="section-label" style="margin-top:1.75rem">This week — sessions done</div>
  <div class="subjects" id="subjects"></div>

  <div class="streak-row">
    <span class="streak-label" id="streak-label">0d streak</span>
    <div class="streak-dots" id="streak-dots"></div>
  </div>

</div>
<script>
const SUBJECTS = {
  phys:{label:'Physics',color:'#f0a030'}, math:{label:'Math',color:'#8b78f0'},
  chem:{label:'Chemistry',color:'#2db87a'}, geo:{label:'Geography',color:'#e06040'},
  chin:{label:'Chinese',color:'#d45880'}, deb:{label:'Debate',color:'#4a9ef0'},
  kayak:{label:'Kayak',color:'#2080d0'}, mock:{label:'Mock',color:'#c060e0'},
  rest:{label:null,color:'#3a3a46'}, tran:{label:null,color:'#2a2a34'},
  misc:{label:null,color:'#3a4a5a'}, cool:{label:null,color:'#2a3a2a'},
};

const MOCK_SUBJECTS = [
  {id:'phys',label:'Physics',color:'#f0a030'},
  {id:'math',label:'Math',color:'#8b78f0'},
  {id:'chem',label:'Chemistry',color:'#2db87a'},
  {id:'geo',label:'Geography',color:'#e06040'},
];

const T_UNUSED = { // replaced by standard 3-step structure
  phys_approach:{title:'Approach first',note:'Before touching numbers: write down (1) what quantity is asked, (2) which principle applies, (3) what equation links them. In words before algebra.',tasks:[
    {text:'Pick 3 unseen questions — write the approach in words before any equation',tag:'sim'},
    {text:'Identify given quantities and what you\'re solving for in each',tag:'sim'},
    {text:'Check: did you define a sign convention before substituting?',tag:'review'},
  ]},
  phys_mechanics:{title:'Mechanics + energy methods',tasks:[
    {text:'2 questions using Newton\'s laws — draw free body diagram before anything else',tag:'sim'},
    {text:'1 conservation of energy problem — write E_initial = E_final with terms labelled',tag:'sim'},
    {text:'1 circular motion or momentum question — identify centripetal direction explicitly',tag:'sim'},
    {text:'Mark against markscheme — note where method marks would be lost',tag:'error'},
  ]},
  phys_waves:{title:'Waves + optics',tasks:[
    {text:'Sketch wavefront or ray diagram before solving — always',tag:'sim'},
    {text:'2 superposition/interference questions — identify path difference first',tag:'sim'},
    {text:'1 refraction question — label n1, n2, angles before Snell\'s law',tag:'sim'},
    {text:'Review: when does phase change on reflection? (dense→less dense boundary)',tag:'review'},
  ]},
  phys_thermo:{title:'Thermodynamics',tasks:[
    {text:'1 ideal gas law question — convert to SI units before substituting',tag:'sim'},
    {text:'1 first law question — define Q and W sign conventions explicitly before solving',tag:'sim'},
    {text:'PV diagram: label isothermal vs adiabatic vs isobaric from memory',tag:'review'},
    {text:'1 data question — show all unit cancellations in working',tag:'sim'},
  ]},
  phys_shm:{title:'SHM',tasks:[
    {text:'Write x(t), v(t), a(t) from scratch — no looking',tag:'review'},
    {text:'2 SHM questions — identify x=0 and x=A before substituting',tag:'sim'},
    {text:'Energy in SHM: draw KE and PE vs displacement graph from memory',tag:'review'},
    {text:'1 pendulum or spring question — derive T, then solve',tag:'sim'},
  ]},
  phys_relativity:{title:'Special relativity',tasks:[
    {text:'Write the two postulates from memory before solving anything',tag:'review'},
    {text:'1 time dilation question — identify who measures proper time',tag:'sim'},
    {text:'1 length contraction question — label which frame is the rest frame',tag:'sim'},
    {text:'1 spacetime interval question — confirm s² is invariant',tag:'sim'},
  ]},
  phys_paper:{title:'Past paper simulation',tasks:[
    {text:'45-min timer — one full paper section under timed conditions',tag:'sim'},
    {text:'No markscheme until time is up',tag:'sim'},
    {text:'After: every wrong answer — approach error or execution error?',tag:'error'},
    {text:'Write the correct approach (not just answer) for each miss',tag:'error'},
  ]},
  phys_errorreview:{title:'Error autopsy',tasks:[
    {text:'List every question wrong this week',tag:'error'},
    {text:'Classify: wrong approach / right approach wrong execution / unit/sign error',tag:'error'},
    {text:'For approach errors: write correct method in full sentences',tag:'error'},
    {text:'For execution errors: redo with slower working shown',tag:'error'},
  ]},
  math_trig:{title:'Trig consolidation',note:'Derive identities from first principles — know where they come from, not just what they are.',tasks:[
    {text:'Derive sin²+cos²=1 from unit circle, then write tan, sec, csc, cot',tag:'review'},
    {text:'Prove one double-angle identity without looking',tag:'review'},
    {text:'2 problems: solve trig equation on a given interval — list ALL solutions',tag:'sim'},
    {text:'1 problem using compound angle formula — set up before substituting',tag:'sim'},
  ]},
  math_combinatorics:{title:'Combinatorics',note:'Every problem: ask out loud "does ORDER matter?" before writing anything. Yes → permutation. No → combination.',tasks:[
    {text:'3 counting problems — write "order matters: yes/no" before each',tag:'sim'},
    {text:'1 problem with restrictions — try complement method',tag:'sim'},
    {text:'1 problem with identical objects — check if dividing by repeats is needed',tag:'sim'},
    {text:'Derive nCr formula from first principles',tag:'review'},
  ]},
  math_binomial:{title:'Binomial theorem',tasks:[
    {text:'Write general term T(r+1) = nCr · a^(n-r) · b^r from memory',tag:'review'},
    {text:'2 expansion questions — find a specific term (not the full expansion)',tag:'sim'},
    {text:'1 problem: find coefficient of x^k — set up exponent equation before solving',tag:'sim'},
    {text:'1 application: use binomial to approximate (1+x)^n for small x',tag:'sim'},
  ]},
  math_concept:{title:'Conceptual deep work',note:'Competition problems require seeing the structure. Read the problem twice. Ask: what does this problem WANT me to notice?',tasks:[
    {text:'1 hard unseen problem — 10 min reading and annotating before solving',tag:'sim'},
    {text:'Write down what approach you\'re trying and WHY before executing',tag:'sim'},
    {text:'If stuck after 15 min: identify exactly where, write it out',tag:'review'},
    {text:'After solving: what was the key structural insight?',tag:'review'},
  ]},
  math_paper:{title:'Timed past paper',tasks:[
    {text:'Full section — strict timing, no pausing',tag:'sim'},
    {text:'Show all working — method marks exist even if answer is wrong',tag:'sim'},
    {text:'Flag questions where you knew method but ran out of time',tag:'sim'},
    {text:'After: the 2 questions that cost most marks — do them again',tag:'error'},
  ]},
  math_errorreview:{title:'Error review',tasks:[
    {text:'Pull every wrong answer from this week',tag:'error'},
    {text:'For each: one sentence explaining the misunderstanding',tag:'error'},
    {text:'Redo the 3 hardest ones cold — no notes',tag:'sim'},
  ]},
  chem_checklist:{title:'Error-prevention protocol',note:'Before any answer: (1) units consistent? (2) sig figs? (3) sign correct for ΔH/ΔG? (4) charges balanced? Mandatory last step every time.',tasks:[
    {text:'Write your error checklist from memory before starting questions',tag:'review'},
    {text:'3 past paper questions — apply checklist after each before moving on',tag:'sim'},
    {text:'On any wrong answer: which checklist item would have caught it?',tag:'error'},
  ]},
  chem_bonding:{title:'Bonding + structure',tasks:[
    {text:'Draw 3 Lewis structures — check formal charges and octets explicitly',tag:'sim'},
    {text:'1 VSEPR question — draw electron geometry AND molecular geometry separately',tag:'sim'},
    {text:'Compare bond polarity vs molecular polarity for 2 molecules',tag:'review'},
    {text:'1 ionic equation — verify charges balance before AND after',tag:'sim'},
  ]},
  chem_thermo:{title:'Thermochemistry',tasks:[
    {text:'1 Hess\'s law question — write each step with correct sign manipulation',tag:'sim'},
    {text:'1 calorimetry — check: q=mcΔT, is ΔT positive in the right direction?',tag:'sim'},
    {text:'Bond enthalpy: bonds broken (positive) vs bonds formed (negative)',tag:'sim'},
    {text:'After each: apply full error checklist',tag:'error'},
  ]},
  chem_organic:{title:'Organic chemistry',tasks:[
    {text:'Identify functional groups in 3 molecules — write reaction type each undergoes',tag:'review'},
    {text:'1 mechanism question — curly arrows from electron-rich to electron-poor',tag:'sim'},
    {text:'Name 3 compounds using IUPAC — check suffix before finalising',tag:'sim'},
  ]},
  chem_mcq:{title:'MCQ simulation',note:'MCQ: eliminate clearly wrong answers first, then verify your choice against units and logic before committing.',tasks:[
    {text:'20 MCQ under timed conditions — 1 min per question max',tag:'sim'},
    {text:'After: review every question you weren\'t 100% sure about',tag:'error'},
    {text:'For wrong answers: knowledge gap or silly error?',tag:'error'},
  ]},
  geo_essay:{title:'IB essay structure',note:'IB Geography rewards: clear thesis → named case studies early → analytical links to the question → evaluative conclusion that returns to the question. Describe nothing — every paragraph must EXPLAIN.',tasks:[
    {text:'10-min timed plan — thesis + 3 argument points + case study each',tag:'essay'},
    {text:'Check: does each paragraph answer the question or just describe a case?',tag:'review'},
    {text:'Write opening paragraph — does it contain a specific, arguable thesis?',tag:'essay'},
  ]},
  geo_casestudies:{title:'Case study consolidation',tasks:[
    {text:'List your 5 strongest case studies — write 2 specific statistics each from memory',tag:'review'},
    {text:'Identify 2 case studies with no statistics — these are the gaps',tag:'review'},
    {text:'For 1 weak case study: write a 3-sentence exam-ready summary',tag:'essay'},
  ]},
  geo_markscheme:{title:'Markscheme analysis',note:'IB markschemes reward: named examples, specific data, explicit link to command term, evaluative statements.',tasks:[
    {text:'Read the markscheme for last essay — what did the examiner reward?',tag:'review'},
    {text:'Identify 2 marks lost — write what you\'d add to get them',tag:'error'},
    {text:'Rewrite one body paragraph incorporating markscheme language',tag:'essay'},
  ]},
  geo_ppn:{title:'Power, Places & Networks',tasks:[
    {text:'25-min timed response to a PPnN question',tag:'essay'},
    {text:'Use \'resistance\', \'flows\', \'networks\', \'global governance\' explicitly',tag:'essay'},
    {text:'Check conclusion: does it evaluate (not just summarise)?',tag:'review'},
  ]},
  chin_vocab:{title:'Vocabulary for comprehension',note:'Goal is exam reading comprehension. Prioritise high-frequency IB topic vocab — environment, health, education, technology. Focus on question-stem words.',tasks:[
    {text:'Anki: 20 new cards — IB topic vocabulary',tag:'vocab'},
    {text:'Review yesterday\'s cards — suspend any right 3x in a row',tag:'vocab'},
    {text:'Write 5 new words each in a sentence — in Chinese',tag:'vocab'},
  ]},
  chin_reading:{title:'Reading comprehension',tasks:[
    {text:'Read one past paper text — underline every unknown word before questions',tag:'sim'},
    {text:'Answer questions using context clues even for unknown words',tag:'sim'},
    {text:'After: look up underlined words — add new ones to Anki',tag:'vocab'},
  ]},
  chin_output:{title:'Output practice',tasks:[
    {text:'Write 5 sentences in Chinese using this week\'s new vocab',tag:'sim'},
    {text:'Read them aloud — does each sound natural?',tag:'drill'},
    {text:'Correct any grammar errors — write the correct version',tag:'error'},
  ]},
  chin_listening:{title:'Listening + speaking',tasks:[
    {text:'10 min Mandarin audio — note new vocab',tag:'vocab'},
    {text:'Summarise what you heard in 3 sentences in Chinese — spoken aloud',tag:'drill'},
    {text:'Add new topic words to Anki',tag:'vocab'},
  ]},
  deb_poi:{title:'POI drilling',note:'WSDC POIs: 15 seconds max. Must (1) disrupt flow, (2) expose a concession or contradiction, (3) be a genuine question — not a statement.',tasks:[
    {text:'Set 8-min timer — deliver a 3-min constructive on any topic',tag:'drill'},
    {text:'Record — replay and offer a POI at every minute mark',tag:'drill'},
    {text:'Evaluate each: question or statement? Did it target a weakness?',tag:'review'},
    {text:'Drill 5 more POIs — each a genuine question under 15 seconds',tag:'drill'},
  ]},
  deb_delivery:{title:'Delivery + pace',note:'WSDC rewards clarity, not speed. Slow down on key claims. Pause before main arguments. Silence > filler words.',tasks:[

const DAY_NAMES=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const DAY_SHORT=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const KAYAK_DAYS=[0,2,4,5];
const MOCK_DAYS=[1,6]; // Tue, Sun

function today(){return new Date().toISOString().slice(0,10)}
function dateKey(d){return d.toISOString().slice(0,10)}
function getWeekDates(anchor){
  const d=new Date(anchor),dow=(d.getDay()+6)%7;
  d.setDate(d.getDate()-dow);
  const dates=[];for(let i=0;i<7;i++){dates.push(new Date(d));d.setDate(d.getDate()+1)}
  return dates;
}
function loadStore(){try{return JSON.parse(localStorage.getItem('summer-tracker3')||'{}')}catch{return{}}}
function saveStore(s){localStorage.setItem('summer-tracker3',JSON.stringify(s))}

let store=loadStore();
let selectedDate=today();
let expandedBlock=null;

function getDay(key){
  if(!store[key])store[key]={done:{},tasks:{},notes:'',mockSubject:{}};
  if(!store[key].tasks)store[key].tasks={};
  if(!store[key].mockSubject)store[key].mockSubject={};
  return store[key];
}
function dowFromKey(key){return(new Date(key+'T12:00:00').getDay()+6)%7}
function schedule(key){return SCHEDULE[dowFromKey(key)]||[]}
function checkable(b){return !b.passive}
function activeSessions(key){return schedule(key).filter(checkable)}

function parseBlockMinutes(t){
  const parts=t.split('–');
  const parse=s=>{const[h,m]=s.trim().replace('+','').split(':').map(Number);return h*60+(m||0)};
  return{start:parse(parts[0]),end:parts[1]?parse(parts[1]):Infinity};
}
function nowMinutes(){const d=new Date();return d.getHours()*60+d.getMinutes()}
function currentBlockIdx(key){
  if(key!==today())return -1;
  const nm=nowMinutes(),sch=schedule(key);
  for(let i=0;i<sch.length;i++){const{start,end}=parseBlockMinutes(sch[i].t);if(nm>=start&&nm<end)return i}
  return -1;
}
function doneSessions(key){const d=getDay(key);return activeSessions(key).filter((_,i)=>d.done[i])}
function dayProgress(key){const t=activeSessions(key).length;return t?doneSessions(key).length/t:0}
function weekDone(dates){
  const tot=dates.reduce((s,d)=>s+activeSessions(dateKey(d)).length,0);
  const don=dates.reduce((s,d)=>s+doneSessions(dateKey(d)).length,0);
  return tot?Math.round(100*don/tot):0;
}
function streak(){
  let s=0;const d=new Date();
  for(let i=0;i<42;i++){if(dayProgress(dateKey(d))<0.5)break;s++;d.setDate(d.getDate()-1)}
  return s;
}
function totalKayaks(){
  return Object.keys(store).reduce((n,k)=>{
    if(!KAYAK_DAYS.includes(dowFromKey(k)))return n;
    const ki=schedule(k).findIndex(b=>b.s==='kayak');
    return n+(ki>=0&&store[k]?.done?.[ki]?1:0);
  },0);
}
function weekSubjectCounts(dates){
  const counts={};
  dates.forEach(dt=>{
    const k=dateKey(dt),d=getDay(k);
    schedule(k).forEach((b,i)=>{
      if(!checkable(b)||!d.done[i])return;
      if(SUBJECTS[b.s]?.label)counts[b.s]=(counts[b.s]||0)+1;
    });
  });
  return counts;
}

function buildTasksHTML(blockIdx,block,dk){
  const dayData=getDay(dk);
  const topic=block.n||block.l;
  const subLabel=block._mockLabel||block.l;
  const tasks=[
    {text:`YouTube tutorial — search "${topic}" and watch before starting`,tag:'review'},
    {text:`Self-tutoring — work through ${subLabel} from memory, no external help`,tag:'drill'},
    {text:`Practice questions on ${subLabel} — timed, mark yourself after`,tag:'sim'},
  ];
  let html='<div class="task-section"><div class="task-list">';
  tasks.forEach((task,ti)=>{
    const tid=`${blockIdx}:std:${ti}`;
    const done=!!(dayData.tasks[tid]);
    const tagH=task.tag?`<span class="task-tag tag-${task.tag}">${task.tag}</span>`:'';
    html+=`<div class="task-item${done?' task-done':''}" data-taskid="${tid}" onclick="toggleTask('${dk}','${tid}')">
      <div class="task-cb"><svg class="task-check-sm" width="8" height="6" viewBox="0 0 8 6" fill="none"><path d="M1 3L3 5L7 1" stroke="#0d0d0f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <span class="task-text">${task.text}</span>${tagH}</div>`;
  });
  html+='</div></div>';
  return html;
}

function toggleTask(dk,tid){
  const d=getDay(dk);d.tasks[tid]=!d.tasks[tid];saveStore(store);
  const el=document.querySelector(`[data-taskid="${tid}"]`);
  if(el)el.classList.toggle('task-done',!!d.tasks[tid]);
}

function setMockSubject(dk,blockIdx,subjectId){
  const d=getDay(dk);d.mockSubject[blockIdx]=subjectId;saveStore(store);render();
}

function render(){
  const anchorDate=new Date(selectedDate+'T12:00:00');
  const weekDates=getWeekDates(anchorDate);
  const todayKey=today();

  // header-date kept live by tickClock()

  // Week strip
  const strip=document.getElementById('week-strip');strip.innerHTML='';
  weekDates.forEach((dt,i)=>{
    const k=dateKey(dt),pct=dayProgress(k);
    const isKayak=KAYAK_DAYS.includes(i),isMock=MOCK_DAYS.includes(i);
    const pipColor=isKayak?'#2080d0':isMock?'#c060e0':'transparent';
    const btn=document.createElement('button');
    btn.className='day-btn'+(k===selectedDate?' active':'')+(k===todayKey?' today':'');
    btn.innerHTML=`<span class="day-name">${DAY_SHORT[i]}</span><span class="day-num">${dt.getDate()}</span>
      <span class="day-pip" style="background:${pipColor}"></span>
      <div class="day-progress"><div class="day-progress-fill" style="width:${Math.round(pct*100)}%"></div></div>`;
    btn.onclick=()=>{selectedDate=k;expandedBlock=null;render()};
    strip.appendChild(btn);
  });

  document.getElementById('day-label').textContent=DAY_NAMES[dowFromKey(selectedDate)];

  const blocksEl=document.getElementById('blocks');blocksEl.innerHTML='';
  const dayData=getDay(selectedDate);
  const sch=schedule(selectedDate);

  const nowIdx=currentBlockIdx(selectedDate);

  sch.forEach((b,i)=>{
    const isPassive=!!b.passive;
    const isDone=!isPassive&&!!dayData.done[i];
    const isNow=i===nowIdx&&!isPassive;
    const isMockBlock=!!b.isMock;
    const expandKey=`${selectedDate}:${i}`;
    const isExpanded=expandedBlock===expandKey;
    const hasTasks=!isPassive;

    if(isNow){
      const line=document.createElement('div');
      line.className='now-line';
      line.innerHTML='<div class="now-line-dot"></div><div class="now-line-bar"></div><span class="now-line-time" id="now-time"></span>';
      blocksEl.appendChild(line);
    }
    const chosenMock=dayData.mockSubject[i];
    const mockSub=chosenMock?MOCK_SUBJECTS.find(s=>s.id===chosenMock):null;

    let color=SUBJECTS[b.s]?.color||'#444';
    if(isMockBlock&&mockSub)color=mockSub.color;

    const el=document.createElement('div');
    el.className='block'+(isDone?' done':'')+(isPassive?' passive':'')+(isExpanded?' expanded':'')+(isMockBlock?' mock-block':'')+(isNow?' now':'');

    const expandBtnHTML=(!isPassive&&hasTasks)?`<button class="expand-btn" onclick="event.stopPropagation();toggleExpand('${expandKey}')">${isExpanded?'▲ hide':'▼ tasks'}</button>`:'';
    const checkHTML=!isPassive?`<div class="block-check"><svg class="checkmark" width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="#0d0d0f" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`:'';
    const mockBadge=isMockBlock&&mockSub?`<span class="mock-badge">${mockSub.label}</span>`:(isMockBlock?`<span class="mock-badge">pick subject ↓</span>`:'');

    let tasksHTML='';
    if(isMockBlock&&isExpanded){
      // Subject picker + tasks
      const pickerBtns=MOCK_SUBJECTS.map(s=>`<button class="mock-subject-btn${chosenMock===s.id?' selected':''}" style="${chosenMock===s.id?`background:${s.color}20;border-color:${s.color};color:${s.color}`:''}" onclick="event.stopPropagation();setMockSubject('${selectedDate}',${i},'${s.id}')">${s.label}</button>`).join('');
      const pickerHTML=`<div class="mock-picker"><span class="mock-picker-label">Subject:</span>${pickerBtns}</div>`;
      const mockBlock={...b,_mockLabel:mockSub?mockSub.label:b.l};
      const taskContent=buildTasksHTML(i,mockBlock,selectedDate);
      tasksHTML=`${pickerHTML}<div class="block-tasks" style="display:block">${taskContent}</div>`;
    } else if(isExpanded&&hasTasks){
      tasksHTML=`<div class="block-tasks">${buildTasksHTML(i,b,selectedDate)}</div>`;
    } else {
      tasksHTML=`<div class="block-tasks"></div>`;
    }

    el.innerHTML=`
      <div class="block-header">
        <div class="block-accent" style="background:${color}"></div>
        <div class="block-time">${b.t}</div>
        <div class="block-body">
          <div class="block-text">
            <div class="block-label">${b.l}</div>
            ${b.n?`<div class="block-note">${b.n}</div>`:''}
          </div>
          <div class="block-right">${mockBadge}${expandBtnHTML}${checkHTML}</div>
        </div>
      </div>${tasksHTML}`;

    if(!isPassive){
      el.querySelector('.block-header').onclick=(e)=>{
        if(e.target.closest('.expand-btn')||e.target.closest('.mock-subject-btn'))return;
        dayData.done[i]=!dayData.done[i];saveStore(store);render();
      };
    }
    blocksEl.appendChild(el);
  });

  const notesEl=document.getElementById('notes');
  notesEl.value=dayData.notes||'';
  notesEl.oninput=()=>{dayData.notes=notesEl.value;saveStore(store)};

  const active=activeSessions(selectedDate).length,done=doneSessions(selectedDate).length;
  document.getElementById('stat-today').textContent=`${done}/${active}`;
  document.getElementById('stat-week').textContent=`${weekDone(weekDates)}%`;
  document.getElementById('stat-streak').textContent=`${streak()}d`;
  document.getElementById('stat-kayak').textContent=totalKayaks();

  const counts=weekSubjectCounts(weekDates);
  const subEl=document.getElementById('subjects');subEl.innerHTML='';
  ['phys','math','chem','geo','chin','deb','kayak'].forEach(s=>{
    const sub=SUBJECTS[s],c=counts[s]||0;
    const card=document.createElement('div');card.className='subject-card';
    card.innerHTML=`<div class="subject-dot" style="background:${sub.color}"></div><span class="subject-name">${sub.label}</span><span class="subject-count">${c}</span>`;
    subEl.appendChild(card);
  });

  const dotsEl=document.getElementById('streak-dots');dotsEl.innerHTML='';
  const now=new Date();
  for(let i=41;i>=0;i--){
    const d2=new Date(now);d2.setDate(d2.getDate()-i);
    const k=dateKey(d2),p=dayProgress(k);
    const cl=p>=0.8?'hit':p>=0.4?'partial':'';
    const dot=document.createElement('div');
    dot.className='streak-dot'+(cl?' '+cl:'');
    dotsEl.appendChild(dot);
  }
  document.getElementById('streak-label').textContent=`${streak()}d streak`;
}

function toggleExpand(key){expandedBlock=expandedBlock===key?null:key;render()}
function goToday(){selectedDate=today();expandedBlock=null;render()}

let lastToday=today();
function tickClock(){
  const now=new Date();
  const dateStr=new Date(selectedDate+'T12:00:00').toLocaleDateString('en-CA',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const timeStr=now.toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  const el=document.getElementById('header-date');if(el)el.textContent=`${dateStr} · ${timeStr}`;
  const nowEl=document.getElementById('now-time');if(nowEl)nowEl.textContent=timeStr;
  const newToday=today();
  if(newToday!==lastToday){if(selectedDate===lastToday){selectedDate=newToday;render()}lastToday=newToday}
}

render();tickClock();setInterval(tickClock,1000);
</script>
