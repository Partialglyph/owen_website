<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Owen Kan</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      overflow-x: hidden;
    }

    /* ── HERO ────────────────────────────────────────── */
    .hero {
      width: 100%;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }
    #hero-canvas {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      display: block;
    }
    .hero-text {
      position: absolute;
      top: 8vh; left: 5vw;
      z-index: 10;
      pointer-events: none;
    }
    .hero-text .name {
      display: block;
      font-size: clamp(3rem, 7vw, 6.5rem);
      font-weight: 300;
      line-height: 0.93;
      letter-spacing: -0.025em;
    }
    .hero-text .sub {
      margin-top: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .hero-text .sub span {
      font-size: clamp(0.58rem, 0.9vw, 0.74rem);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.38);
    }
    .scroll-hint {
      position: absolute;
      bottom: 3vh; left: 5vw;
      font-size: 0.56rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.18);
      z-index: 10;
    }

    /* ── BENTO ───────────────────────────────────────── */
    .bento-page {
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      /* no negative margin — hero and bento are separate, site elongates */
    }

    .panel {
      background: #0c0c0c;
      border: 1px solid rgba(255,255,255,0.11);
      border-radius: 3px;
      position: relative;
    }
    .panel .inner {
      position: absolute;
      inset: 0;
      padding: 14px;
      display: flex;
      flex-direction: column;
    }
    .cn {
      position: absolute;
      width: 12px; height: 12px;
      border-color: rgba(255,255,255,0.28);
      border-style: solid;
      pointer-events: none;
      z-index: 10;
    }
    .cn-tl { top:0;    left:0;  border-width:1px 0 0 1px; }
    .cn-tr { top:0;    right:0; border-width:1px 1px 0 0; }
    .cn-bl { bottom:0; left:0;  border-width:0 0 1px 1px; }
    .cn-br { bottom:0; right:0; border-width:0 1px 1px 0; }

    /* name + side panel row */
    .top-row {
      display: grid;
      grid-template-columns: 1fr 22%;
      gap: 6px;
      height: 48vh;
    }
    .top-name {
      padding: 18px 20px;
      display: flex;
      align-items: flex-start;
    }
    .top-name h2 {
      font-size: clamp(1.6rem, 3vw, 2.8rem);
      font-weight: 300;
      letter-spacing: -0.01em;
    }

    /* 3D graph — full width, tall */
    .graph-panel {
      height: 70vh;
      cursor: grab;
      overflow: hidden;
    }
    .graph-panel:active { cursor: grabbing; }
    #three-canvas, #label-canvas {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      display: block;
    }
    #label-canvas { pointer-events: none; }

    /* remaining bento panels */
    .bottom-row {
      display: grid;
      grid-template-columns: 27% 1fr 27%;
      gap: 6px;
    }
    .bl { display: grid; grid-template-rows: 1fr 2fr; gap: 6px; height: 52vh; }
    .bc { display: grid; grid-template-rows: 1fr 1fr; gap: 6px; }
    .br { height: 52vh; }
  </style>
</head>
<body>

  <!-- ── HERO ─────────────────────────────────────────── -->
  <section class="hero">
    <canvas id="hero-canvas"></canvas>
    <div class="hero-text">
      <span class="name">Owen</span>
      <span class="name">Kan</span>
      <div class="sub">
        <span>Graphic Designer</span>
        <span>Brand · Digital · Motion</span>
        <span>Vancouver BC — Available</span>
      </div>
    </div>
    <div class="scroll-hint">scroll ↓</div>
  </section>

  <!-- ── BENTO ─────────────────────────────────────────── -->
  <section class="bento-page">

    <div class="top-row">
      <div class="top-name"><h2>Owen Kan</h2></div>
      <div class="panel" id="p-top-right"><div class="inner"></div></div>
    </div>

    <!-- 3D GRAPH PANEL -->
    <div class="panel graph-panel" id="p-graph">
      <canvas id="three-canvas"></canvas>
      <canvas id="label-canvas"></canvas>
    </div>

    <div class="bottom-row">
      <div class="bl">
        <div class="panel" id="p-bl-top"><div class="inner"></div></div>
        <div class="panel" id="p-bl-bot"><div class="inner"></div></div>
      </div>
      <div class="bc">
        <div class="panel" id="p-bc-top"><div class="inner"></div></div>
        <div class="panel" id="p-bc-bot"><div class="inner"></div></div>
      </div>
      <div class="panel br" id="p-br"><div class="inner"></div></div>
    </div>

  </section>

  <script>
    // ────────────────────────────────────────────────────
    // CORNER BRACKETS
    // ────────────────────────────────────────────────────
    document.querySelectorAll('.panel').forEach(p => {
      ['tl','tr','bl','br'].forEach(pos => {
        const c = document.createElement('div');
        c.className = `cn cn-${pos}`;
        p.appendChild(c);
      });
    });

    // ────────────────────────────────────────────────────
    // HERO — PIXEL CELL GRAPHIC
    // ────────────────────────────────────────────────────
    const heroCanvas = document.getElementById('hero-canvas');
    const hCtx = heroCanvas.getContext('2d');

    const CELL = 60, GAP = 2, STEP = 57;

    const PAL = [
      [10,  10,  14],
      [14,  24,  52],
      [28,  58, 110],
      [55,  105,165],
      [120, 175,215],
      [195, 225,248],
      [230, 242,255],
    ];

    function sr(s) {
      const x = Math.sin(s * 127.1 + 311.7) * 43758.5453;
      return x - Math.floor(x);
    }
    function getBrightness(c, r, COLS, ROWS) {
      const nx = c/COLS, ny = r/ROWS;
      const cx = 0.62, cy = 0.52;
      const dx = (nx-cx)*1.3, dy = (ny-cy)*1.1;
      const dist = Math.sqrt(dx*dx+dy*dy);
      const n = (sr(c*0.41+r*0.29)-0.5)*0.18;
      return Math.pow(Math.max(0, 1-(dist+n)/0.95), 1.6);
    }
    function palColor(b) {
      const stops=[0,.12,.28,.50,.70,.88,1];
      for (let i=0;i<stops.length-1;i++) {
        if (b<=stops[i+1]) {
          const t=(b-stops[i])/(stops[i+1]-stops[i]);
          const a=PAL[i],bv=PAL[i+1];
          return [
            Math.round(a[0]+(bv[0]-a[0])*t),
            Math.round(a[1]+(bv[1]-a[1])*t),
            Math.round(a[2]+(bv[2]-a[2])*t),
          ];
        }
      }
      return PAL[PAL.length-1];
    }

    let heroGrid=[], hW=0, hH=0;
    let bloomCanvas=null, bCtx=null;

    function buildHeroGrid() {
      hW = heroCanvas.offsetWidth;
      hH = heroCanvas.offsetHeight;
      const COLS = Math.ceil(hW/STEP)+1;
      const ROWS = Math.ceil(hH/STEP)+1;
      heroGrid=[];
      for (let r=0;r<ROWS;r++) {
        for (let c=0;c<COLS;c++) {
          const bri = getBrightness(c,r,COLS,ROWS);
          if (bri<0.03) continue;
          heroGrid.push({
            x:c*STEP, y:r*STEP, bri,
            blinkSpeed:  0.4+sr(c*73+r*37)*1.2,
            blinkPhase:  sr(c*53+r*91+7)*Math.PI*2,
            blinkDepth:  (0.06+sr(c*29+r*61+13)*0.18)*(0.5+(1-bri)*0.5),
          });
        }
      }
      // Rebuild cached bloom canvas
      bloomCanvas = document.createElement('canvas');
      bloomCanvas.width = hW; bloomCanvas.height = hH;
      bCtx = bloomCanvas.getContext('2d');
    }

    function drawHeroFrame(t) {
      hCtx.fillStyle='#0a0a0a';
      hCtx.fillRect(0,0,hW,hH);
      bCtx.clearRect(0,0,hW,hH);

      heroGrid.forEach(({x,y,bri,blinkSpeed,blinkPhase,blinkDepth})=>{
        const blink = Math.sin(t*blinkSpeed+blinkPhase);
        const pulsed = Math.max(0,Math.min(1,bri+blink*blinkDepth));
        const col = palColor(pulsed);
        hCtx.fillStyle=`rgb(${col[0]},${col[1]},${col[2]})`;
        hCtx.fillRect(x,y,CELL,CELL);
        hCtx.fillStyle='rgba(0,0,0,0.20)';
        for (let lx=x;lx<x+CELL;lx+=4) hCtx.fillRect(lx,y,1,CELL);
        if (pulsed>0.40) {
          const alpha=((pulsed-0.40)/0.60)*0.88;
          bCtx.fillStyle=`rgba(${col[0]},${col[1]},${col[2]},${alpha})`;
          bCtx.fillRect(x,y,CELL,CELL);
        }
      });

      hCtx.save();
      hCtx.filter='blur(22px)';
      hCtx.globalCompositeOperation='screen';
      hCtx.globalAlpha=0.52;
      hCtx.drawImage(bloomCanvas,0,0);
      hCtx.restore();

      hCtx.save();
      hCtx.filter='blur(7px)';
      hCtx.globalCompositeOperation='screen';
      hCtx.globalAlpha=0.38;
      hCtx.drawImage(bloomCanvas,0,0);
      hCtx.restore();

      // Radial edge fade
      const fade=hCtx.createRadialGradient(hW*.60,hH*.50,hH*.06,hW*.50,hH*.48,hH*.80);
      fade.addColorStop(0,   'rgba(10,10,14,0)');
      fade.addColorStop(0.45,'rgba(10,10,14,0.08)');
      fade.addColorStop(0.70,'rgba(10,10,14,0.55)');
      fade.addColorStop(0.88,'rgba(10,10,14,0.88)');
      fade.addColorStop(1,   'rgba(10,10,14,1)');
      hCtx.fillStyle=fade; hCtx.fillRect(0,0,hW,hH);

      // Text-zone mask
      const tm=hCtx.createLinearGradient(0,0,hW*.46,hH*.48);
      tm.addColorStop(0,   'rgba(10,10,14,0.82)');
      tm.addColorStop(0.55,'rgba(10,10,14,0.08)');
      tm.addColorStop(1,   'rgba(10,10,14,0)');
      hCtx.fillStyle=tm; hCtx.fillRect(0,0,hW,hH);
    }

    function setupHero() {
      const dpr=window.devicePixelRatio||1;
      const w=heroCanvas.offsetWidth, h=heroCanvas.offsetHeight;
      heroCanvas.width=w*dpr; heroCanvas.height=h*dpr;
      hCtx.setTransform(dpr,0,0,dpr,0,0);
      buildHeroGrid();
    }
    setupHero();
    window.addEventListener('resize',()=>{ hCtx.setTransform(1,0,0,1,0,0); setupHero(); });

    // ────────────────────────────────────────────────────
    // 3D NETWORK GRAPH
    // ────────────────────────────────────────────────────
    const threeCanvas = document.getElementById('three-canvas');
    const labelCanvas = document.getElementById('label-canvas');
    const lCtx = labelCanvas.getContext('2d');
    const graphPanel = document.getElementById('p-graph');

    function initThree() {
      const W = threeCanvas.offsetWidth;
      const H = threeCanvas.offsetHeight;
      threeCanvas.width  = W * (window.devicePixelRatio||1);
      threeCanvas.height = H * (window.devicePixelRatio||1);

      const renderer = new THREE.WebGLRenderer({
        canvas: threeCanvas,
        antialias: true,
        alpha: true,
      });
      renderer.setSize(W, H);
      renderer.setPixelRatio(window.devicePixelRatio||1);
      renderer.setClearColor(0x000000, 0);

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(52, W/H, 0.1, 100);
      camera.position.z = 11;

      // ── Node data ──────────────────────────────────
      // Three clusters — positioned to feel like the reference
      // Creative: Photo, Video, Guitar  → yellow-green
      // Professional: Programming, Business, Debate → blue
      // Physical: Kayaking, First Aid  → teal / coral
      const HUBS = [
        // Creative cluster (left)
        { label:'Photography', x:-3.2, y: 1.4, z: 0.3, col:0x14294f, r:0.40 },
        { label:'Videography', x:-1.8, y: 2.3, z:-0.5, col:0x1f3f70, r:0.36 },
        { label:'Guitar',      x:-4.0, y:-0.2, z: 0.9, col:0x3a6aa1, r:0.32 },
        // Professional cluster (right)
        { label:'Programming', x: 2.4, y: 1.4, z:-0.4, col:0x477bb0, r:0.42 },
        { label:'Business',    x: 3.5, y:-0.3, z: 0.6, col:0x9dc6e1, r:0.38 },
        { label:'Debate',      x: 1.8, y:-1.2, z: 0.7, col:0x4e81b2, r:0.32 },
        // Physical cluster (bottom-center)
        { label:'Kayaking',   x:-0.4, y:-2.8, z: 0.9, col:0x122344, r:0.36 },
        { label:'First Aid',  x: 1.2, y:-2.4, z:-0.6, col:0xe1f1fd, r:0.32 },
      ];

      // Hub-to-hub edges [indexA, indexB]
      const HUB_EDGES = [
        [0,1],[0,2],[1,2],           // creative internal
        [3,4],[4,5],[3,5],           // professional internal
        [6,7],                        // physical internal
        [1,3],[0,3],                 // video/photo → programming (digital tools)
        [5,7],                        // debate → first aid (leadership)
        [6,2],                        // kayaking → guitar (leisure)
        [0,6],[4,3],                 // cross connections
      ];

      const graphGroup = new THREE.Group();
      scene.add(graphGroup);

      // Build hub meshes
      const hubMeshes = HUBS.map(h => {
        const geo = new THREE.SphereGeometry(h.r, 20, 20);
        const mat = new THREE.MeshBasicMaterial({ color: h.col });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(h.x, h.y, h.z);
        graphGroup.add(mesh);
        return mesh;
      });

      // Glow halos around hubs (slightly larger, transparent)
      HUBS.forEach((h, i) => {
        const geo = new THREE.SphereGeometry(h.r * 1.8, 20, 20);
        const mat = new THREE.MeshBasicMaterial({
          color: h.col,
          transparent: true,
          opacity: 0.08,
        });
        const halo = new THREE.Mesh(geo, mat);
        halo.position.copy(hubMeshes[i].position);
        graphGroup.add(halo);
      });

      // Satellites around each hub
      const satPositions = [];
      HUBS.forEach((h, hi) => {
        const count = 10 + Math.floor(sr(hi * 97) * 8); // 10–17 per hub
        for (let i = 0; i < count; i++) {
          const phi   = sr(hi*41+i*13) * Math.PI * 2;
          const theta = sr(hi*67+i*29) * Math.PI;
          const dist  = 0.9 + sr(hi*53+i*17) * 0.9;
          const sx = h.x + dist * Math.sin(theta) * Math.cos(phi);
          const sy = h.y + dist * Math.sin(theta) * Math.sin(phi);
          const sz = h.z + dist * Math.cos(theta);
          const sr2 = 0.06 + sr(hi*31+i*19) * 0.08;
          const geo = new THREE.SphereGeometry(sr2, 8, 8);
          const mat = new THREE.MeshBasicMaterial({
            color: h.col,
            transparent: true,
            opacity: 0.55 + sr(hi*23+i*37)*0.35,
          });
          const mesh = new THREE.Mesh(geo, mat);
          mesh.position.set(sx, sy, sz);
          graphGroup.add(mesh);
          satPositions.push({ pos:[sx,sy,sz], hubIdx:hi });
        }
      });

      // Build all edge geometry in one LineSegments call
      const lineVerts = [];
      const lineColors = [];

      function addEdge(ax,ay,az, bx,by,bz, col, alpha) {
        lineVerts.push(ax,ay,az, bx,by,bz);
        const r=((col>>16)&0xff)/255;
        const g=((col>>8)&0xff)/255;
        const b=(col&0xff)/255;
        lineColors.push(r,g,b,alpha, r,g,b,alpha);
      }

      // Hub–hub edges
      HUB_EDGES.forEach(([a,b]) => {
        const ha=HUBS[a], hb=HUBS[b];
        const midCol = HUBS[a].col; // use source color
        addEdge(ha.x,ha.y,ha.z, hb.x,hb.y,hb.z, midCol, 0.28);
      });

      // Hub–satellite edges
      satPositions.forEach(({ pos, hubIdx }) => {
        const h = HUBS[hubIdx];
        addEdge(h.x,h.y,h.z, pos[0],pos[1],pos[2], h.col, 0.13);
      });

      // A few satellite–satellite edges within same cluster
      for (let i=0; i<satPositions.length; i++) {
        for (let j=i+1; j<satPositions.length; j++) {
          if (satPositions[i].hubIdx !== satPositions[j].hubIdx) continue;
          if (sr(i*83+j*47) > 0.18) continue; // sparse
          const pi=satPositions[i].pos, pj=satPositions[j].pos;
          const dx=pi[0]-pj[0],dy=pi[1]-pj[1],dz=pi[2]-pj[2];
          if (dx*dx+dy*dy+dz*dz>4) continue; // only nearby
          addEdge(pi[0],pi[1],pi[2], pj[0],pj[1],pj[2], HUBS[satPositions[i].hubIdx].col, 0.08);
        }
      }

      const lineGeo = new THREE.BufferGeometry();
      lineGeo.setAttribute('position', new THREE.Float32BufferAttribute(lineVerts, 3));
      // Use VertexColors for per-edge coloring
      const lineMat = new THREE.LineBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.22,
      });
      graphGroup.add(new THREE.LineSegments(lineGeo, lineMat));

      // ── Mouse tilt ─────────────────────────────────
      let targetRotX=0, targetRotY=0, curRotX=0, curRotY=0;
      graphPanel.addEventListener('mousemove', e => {
        const rect = graphPanel.getBoundingClientRect();
        targetRotY = ((e.clientX-rect.left)/rect.width  - 0.5) * 1.4;
        targetRotX = ((e.clientY-rect.top) /rect.height - 0.5) * 0.8;
      });
      graphPanel.addEventListener('mouseleave', () => { targetRotX=0; targetRotY=0; });

      // ── Labels ─────────────────────────────────────
      function renderLabels() {
        const lW = labelCanvas.offsetWidth;
        const lH = labelCanvas.offsetHeight;
        labelCanvas.width  = lW * (window.devicePixelRatio||1);
        labelCanvas.height = lH * (window.devicePixelRatio||1);
        lCtx.setTransform(window.devicePixelRatio||1,0,0,window.devicePixelRatio||1,0,0);
        lCtx.clearRect(0,0,lW,lH);

        HUBS.forEach((h, i) => {
          const worldPos = new THREE.Vector3();
          hubMeshes[i].getWorldPosition(worldPos);
          const proj = worldPos.clone().project(camera);
          const sx = (proj.x+1)/2*lW;
          const sy = (-proj.y+1)/2*lH;

          // Hub color for label
const r = ((h.col >> 16) & 0xff), 
      g = ((h.col >> 8) & 0xff), 
      b = (h.col & 0xff);

// 1. Change name to 'NeueMontreal' 
// 2. Ensure weight (300) matches your @font-face definition
lCtx.font = "300 11px 'NeueMontreal', sans-serif";

lCtx.letterSpacing = '0.08em';

lCtx.fillStyle = "rgba(255, 255, 255, 0.92)";
lCtx.fillText(h.label.toUpperCase(), sx + h.r * 28 + 4, sy + 4);
        });
      }

      // ── Animate ────────────────────────────────────
      const clock = new THREE.Clock();
      function threeLoop() {
        requestAnimationFrame(threeLoop);
        const elapsed = clock.getElapsedTime();

        // Smooth mouse tilt
        curRotX += (targetRotX-curRotX)*0.04;
        curRotY += (targetRotY-curRotY)*0.04;

        // Slow auto-rotation + mouse override
        graphGroup.rotation.y = curRotY + elapsed * 0.04;
        graphGroup.rotation.x = curRotX;

        renderer.render(scene, camera);
        renderLabels();
      }
      threeLoop();

      // Handle resize
      window.addEventListener('resize', () => {
        const nW = threeCanvas.offsetWidth;
        const nH = threeCanvas.offsetHeight;
        renderer.setSize(nW, nH);
        camera.aspect = nW/nH;
        camera.updateProjectionMatrix();
      });
    }

    // Init Three after layout settles
    requestAnimationFrame(() => initThree());

    // ────────────────────────────────────────────────────
    // HERO ANIMATION LOOP
    // ────────────────────────────────────────────────────
    let h0=null;
    function heroLoop(ts) {
      if (!h0) h0=ts;
      drawHeroFrame((ts-h0)/1000);
      requestAnimationFrame(heroLoop);
    }
    requestAnimationFrame(heroLoop);
  </script>

</body>
</html>
