<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Owen Kan</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

@font-face {
  font-family: 'NeueMontreal';
  src: url('./fonts/PPNeueMontreal-Thin.otf') format('opentype');
  font-weight: 300;
}

@font-face {
  font-family: 'NeueMontreal';
  src: url('./fonts/PPNeueMontreal-Medium.otf') format('opentype');
  font-weight: 500;
}

body {
  background: #0a0a0a;
  color: #fff;
  font-family: 'NeueMontreal', 'Helvetica Neue', Arial, sans-serif;
  overflow-x: hidden;
}

.hero-text .name {
  font-weight: 300; /* Uses the Thin weight */
}

    .hero {
      width: 100%;
      height: 100vh;
      position: relative;
      overflow: hidden;
      -webkit-mask-image: linear-gradient(to bottom, black 55%, transparent 100%);
              mask-image: linear-gradient(to bottom, black 55%, transparent 100%);
    }

    #hero-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .hero-text {
      position: absolute;
      top: 8vh;
      left: 5vw;
      z-index: 10;
      pointer-events: none;
    }
    .hero-text .name {
      display: block;
      font-size: clamp(3rem, 7vw, 6.5rem);
      font-weight: 300;
      line-height: 0.93;
      letter-spacing: -0.025em;
      color: #fff;
    }
    .hero-text .sub {
      margin-top: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .hero-text .sub span {
      font-size: clamp(0.58rem, 0.9vw, 0.74rem);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.38);
    }

    .scroll-hint {
      position: absolute;
      bottom: 3vh;
      left: 5vw;
      font-size: 0.56rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.18);
      z-index: 10;
    }

    /* ── BENTO ───────────────────────────────────────── */
    .bento-page {
      padding: 0 8px 8px 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: -12vh;
      position: relative;
      z-index: 5;
    }

    .panel {
      background: #0c0c0c;
      border: 1px solid rgba(255,255,255,0.11);
      border-radius: 3px;
      position: relative;
    }
    .panel .inner {
      position: absolute;
      inset: 0;
      padding: 14px;
      display: flex;
      flex-direction: column;
    }
    .cn {
      position: absolute;
      width: 12px; height: 12px;
      border-color: rgba(255,255,255,0.28);
      border-style: solid;
      pointer-events: none;
      z-index: 10;
    }
    .cn-tl { top:0; left:0;  border-width:1px 0 0 1px; }
    .cn-tr { top:0; right:0; border-width:1px 1px 0 0; }
    .cn-bl { bottom:0; left:0;  border-width:0 0 1px 1px; }
    .cn-br { bottom:0; right:0; border-width:0 1px 1px 0; }

    .top-row {
      display: grid;
      grid-template-columns: 1fr 22%;
      gap: 6px;
      height: 48vh;
    }
    .top-name {
      padding: 18px 20px;
      display: flex;
      align-items: flex-start;
    }
    .top-name h2 {
      font-size: clamp(1.6rem, 3vw, 2.8rem);
      font-weight: 300;
      letter-spacing: -0.01em;
    }
    .bottom-row {
      display: grid;
      grid-template-columns: 27% 1fr 27%;
      gap: 6px;
    }
    .bl { display: grid; grid-template-rows: 1fr 2fr; gap: 6px; height: 52vh; }
    .bc { display: grid; grid-template-rows: 1fr 1fr; gap: 6px; }
    .br { height: 52vh; }
  </style>
</head>
<body>

  <section class="hero">
    <canvas id="hero-canvas"></canvas>
    <div class="hero-text">
      <span class="name">Owen</span>
      <span class="name">Kan</span>
      <div class="sub">
        <span>Graphic Designer</span>
        <span>Brand · Digital · Motion</span>
        <span>Vancouver BC — Available</span>
      </div>
    </div>
    <div class="scroll-hint">scroll ↓</div>
  </section>

  <section class="bento-page">
    <div class="top-row">
      <div class="top-name"><h2>Owen Kan</h2></div>
      <div class="panel" id="p-top-right"><div class="inner"></div></div>
    </div>
    <div class="bottom-row">
      <div class="bl">
        <div class="panel" id="p-bl-top"><div class="inner"></div></div>
        <div class="panel" id="p-bl-bot"><div class="inner"></div></div>
      </div>
      <div class="bc">
        <div class="panel" id="p-bc-top"><div class="inner"></div></div>
        <div class="panel" id="p-bc-bot"><div class="inner"></div></div>
      </div>
      <div class="panel br" id="p-br"><div class="inner"></div></div>
    </div>
  </section>

  <script>
    // ── CORNER BRACKETS ────────────────────────────────
    document.querySelectorAll('.panel').forEach(p => {
      ['tl','tr','bl','br'].forEach(pos => {
        const c = document.createElement('div');
        c.className = `cn cn-${pos}`;
        p.appendChild(c);
      });
    });

    // ── CONFIG ─────────────────────────────────────────
    const CELL = 54;        // bigger cells
    const GAP  = 3;
    const STEP = CELL + GAP;

    // Blue palette
    const PAL = [
      [10,  10,  14],
      [14,  24,  52],
      [28,  58, 110],
      [55,  105, 165],
      [120, 175, 215],
      [195, 225, 248],
      [230, 242, 255],
    ];

    function sr(s) {
      const x = Math.sin(s * 127.1 + 311.7) * 43758.5453;
      return x - Math.floor(x);
    }

    // Blob brightness — more gradual falloff (wider radius, softer edge)
    function getBrightness(col, row, COLS, ROWS) {
      const nx = col / COLS;
      const ny = row / ROWS;
      const cx = 0.62, cy = 0.52;
      const dx = (nx - cx) * 1.3;
      const dy = (ny - cy) * 1.1;
      const dist = Math.sqrt(dx * dx + dy * dy);
      // Organic noise
      const n = (sr(col * 0.41 + row * 0.29) - 0.5) * 0.18;
      // Softer power curve = more gradual fade at edges
      const raw = Math.max(0, 1 - (dist + n) / 0.95);
      return Math.pow(raw, 3); // >1 = sharper core, gentler edge taper
    }

    function palColor(b) {
      const stops = [0, 0.12, 0.28, 0.50, 0.70, 0.88, 1.0];
      for (let i = 0; i < stops.length - 1; i++) {
        if (b <= stops[i + 1]) {
          const t = (b - stops[i]) / (stops[i + 1] - stops[i]);
          const a = PAL[i], bv = PAL[i + 1];
          return [
            Math.round(a[0] + (bv[0] - a[0]) * t),
            Math.round(a[1] + (bv[1] - a[1]) * t),
            Math.round(a[2] + (bv[2] - a[2]) * t),
          ];
        }
      }
      return PAL[PAL.length - 1];
    }

    const canvas = document.getElementById('hero-canvas');
    const ctx    = canvas.getContext('2d');

    let grid = [];
    let W = 0, H = 0;

    function buildGrid() {
      W = canvas.offsetWidth;
      H = canvas.offsetHeight;
      const COLS = Math.ceil(W / STEP) + 1;
      const ROWS = Math.ceil(H / STEP) + 1;
      grid = [];

      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const bri = getBrightness(c, r, COLS, ROWS);
          // Skip very dim cells — this is what creates the gradual edge:
          // cells fade out by simply not existing below a threshold
          if (bri < 0.03) continue;

          // Per-cell random blink params — set once, used every frame
          // Each cell gets its own speed and phase so they ripple independently
          const blinkSpeed  = 0.4 + sr(c * 73 + r * 37)       * 1.2;  // 0.4–1.6 Hz
          const blinkPhase  = sr(c * 53 + r * 91 + 7)          * Math.PI * 2;
          const blinkDepth  = 0.06 + sr(c * 29 + r * 61 + 13)  * 0.18; // how much it dims
          // Deeper blink for lower-brightness cells (edge cells ripple more visibly)
          const edgeFactor  = 1 - bri;

          grid.push({
            x: c * STEP, y: r * STEP,
            bri,
            blinkSpeed, blinkPhase,
            blinkDepth: blinkDepth * (0.5 + edgeFactor * 0.5),
          });
        }
      }
    }

    function drawFrame(t) {
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, W, H);

      const bloomCanvas = document.createElement('canvas');
      bloomCanvas.width = W; bloomCanvas.height = H;
      const bc = bloomCanvas.getContext('2d');

      grid.forEach(({ x, y, bri, blinkSpeed, blinkPhase, blinkDepth }) => {
        // Per-cell sine blink — each cell has its own frequency + phase
        const blink = Math.sin(t * blinkSpeed + blinkPhase);
        // blink oscillates -1 to 1, scaled by depth → subtle brightness shift
        const pulsed = Math.max(0, Math.min(1, bri + blink * blinkDepth));

        const col = palColor(pulsed);
        ctx.fillStyle = `rgb(${col[0]},${col[1]},${col[2]})`;
        ctx.fillRect(x, y, CELL, CELL);

        // Scan lines
        ctx.fillStyle = 'rgba(0,0,0,0.20)';
        for (let lx = x; lx < x + CELL; lx += 4) {
          ctx.fillRect(lx, y, 1, CELL);
        }

        // Bloom source — brighter cells only
        if (pulsed > 0.40) {
          const alpha = ((pulsed - 0.40) / 0.60) * 0.88;
          bc.fillStyle = `rgba(${col[0]},${col[1]},${col[2]},${alpha})`;
          bc.fillRect(x, y, CELL, CELL);
        }
      });

      // Bloom passes
      ctx.save();
      ctx.filter = 'blur(22px)';
      ctx.globalCompositeOperation = 'screen';
      ctx.globalAlpha = 0.52;
      ctx.drawImage(bloomCanvas, 0, 0);
      ctx.restore();

      ctx.save();
      ctx.filter = 'blur(7px)';
      ctx.globalCompositeOperation = 'screen';
      ctx.globalAlpha = 0.38;
      ctx.drawImage(bloomCanvas, 0, 0);
      ctx.restore();

      // Radial edge fade
      const fade = ctx.createRadialGradient(
        W * 0.60, H * 0.50, H * 0.06,
        W * 0.50, H * 0.48, H * 0.80
      );
      fade.addColorStop(0,    'rgba(10,10,14,0)');
      fade.addColorStop(0.45, 'rgba(10,10,14,0.08)');
      fade.addColorStop(0.70, 'rgba(10,10,14,0.55)');
      fade.addColorStop(0.88, 'rgba(10,10,14,0.88)');
      fade.addColorStop(1,    'rgba(10,10,14,1)');
      ctx.fillStyle = fade;
      ctx.fillRect(0, 0, W, H);

      // Text-zone mask
      const textMask = ctx.createLinearGradient(0, 0, W * 0.46, H * 0.48);
      textMask.addColorStop(0,   'rgba(10,10,14,0.82)');
      textMask.addColorStop(0.55,'rgba(10,10,14,0.08)');
      textMask.addColorStop(1,   'rgba(10,10,14,0)');
      ctx.fillStyle = textMask;
      ctx.fillRect(0, 0, W, H);
    }

    function setup() {
      const dpr = window.devicePixelRatio || 1;
      const w = canvas.offsetWidth;
      const h = canvas.offsetHeight;
      canvas.width  = w * dpr;
      canvas.height = h * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      buildGrid();
    }

    setup();
    window.addEventListener('resize', () => { ctx.setTransform(1,0,0,1,0,0); setup(); });

    let t0 = null;
    function loop(ts) {
      if (!t0) t0 = ts;
      drawFrame((ts - t0) / 1000);
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>

</body>
</html>
