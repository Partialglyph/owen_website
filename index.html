<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Owen Kan</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      overflow-x: hidden;
    }

    /* ── HERO ────────────────────────────────────────── */
    .hero {
      width: 100%;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    #hero-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Text: upper-left, sits over the deliberately dark cell zone */
    .hero-text {
      position: absolute;
      top: 9vh;
      left: 5vw;
      z-index: 10;
      pointer-events: none;
    }
    .hero-text .name {
      display: block;
      font-size: clamp(3rem, 7vw, 6.5rem);
      font-weight: 300;
      line-height: 0.93;
      letter-spacing: -0.025em;
    }
    .hero-text .sub {
      margin-top: 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .hero-text .sub span {
      font-size: clamp(0.6rem, 1vw, 0.78rem);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }

    /* Scroll hint */
    .scroll-hint {
      position: absolute;
      bottom: 2.4vh;
      left: 5vw;
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
      z-index: 10;
    }

    /* ── BENTO ───────────────────────────────────────── */
    .bento-page {
      min-height: 100vh;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .panel {
      background: #0c0c0c;
      border: 1px solid rgba(255,255,255,0.11);
      border-radius: 3px;
      position: relative;
    }
    .panel .inner {
      position: absolute;
      inset: 0;
      padding: 14px;
      display: flex;
      flex-direction: column;
    }
    .cn {
      position: absolute;
      width: 12px; height: 12px;
      border-color: rgba(255,255,255,0.28);
      border-style: solid;
      pointer-events: none;
      z-index: 10;
    }
    .cn-tl { top:0; left:0;  border-width:1px 0 0 1px; }
    .cn-tr { top:0; right:0; border-width:1px 1px 0 0; }
    .cn-bl { bottom:0; left:0;  border-width:0 0 1px 1px; }
    .cn-br { bottom:0; right:0; border-width:0 1px 1px 0; }

    .top-row {
      display: grid;
      grid-template-columns: 1fr 22%;
      gap: 6px;
      height: 48vh;
    }
    .top-name {
      padding: 18px 20px;
      display: flex;
      align-items: flex-start;
    }
    .top-name h2 {
      font-size: clamp(1.6rem, 3vw, 2.8rem);
      font-weight: 300;
      letter-spacing: -0.01em;
    }
    .bottom-row {
      display: grid;
      grid-template-columns: 27% 1fr 27%;
      gap: 6px;
      flex: 1;
    }
    .bl { display: grid; grid-template-rows: 1fr 2fr; gap: 6px; }
    .bc { display: grid; grid-template-rows: 1fr 1fr; gap: 6px; }
  </style>
</head>
<body>

  <!-- HERO -->
  <section class="hero">
    <canvas id="hero-canvas"></canvas>
    <div class="hero-text">
      <span class="name">Owen</span>
      <span class="name">Kan</span>
      <div class="sub">
        <span>Graphic Designer</span>
        <span>Brand · Digital · Motion</span>
        <span>Vancouver BC — Available</span>
      </div>
    </div>
    <div class="scroll-hint">scroll ↓</div>
  </section>

  <!-- BENTO -->
  <section class="bento-page">
    <div class="top-row">
      <div class="top-name"><h2>Owen Kan</h2></div>
      <div class="panel" id="p-top-right"><div class="inner"></div></div>
    </div>
    <div class="bottom-row">
      <div class="bl">
        <div class="panel" id="p-bl-top"><div class="inner"></div></div>
        <div class="panel" id="p-bl-bot"><div class="inner"></div></div>
      </div>
      <div class="bc">
        <div class="panel" id="p-bc-top"><div class="inner"></div></div>
        <div class="panel" id="p-bc-bot"><div class="inner"></div></div>
      </div>
      <div class="panel" id="p-br"><div class="inner"></div></div>
    </div>
  </section>

  <script>
    // ── CORNER BRACKETS ────────────────────────────────
    document.querySelectorAll('.panel').forEach(p => {
      ['tl','tr','bl','br'].forEach(pos => {
        const c = document.createElement('div');
        c.className = `cn cn-${pos}`;
        p.appendChild(c);
      });
    });

    // ── HERO GRAPHIC ───────────────────────────────────
    const canvas = document.getElementById('hero-canvas');
    const ctx    = canvas.getContext('2d');
    const BG     = '#0a0a0a';

    // Minimal 4-tone palette: near-white → slate-blue → dark navy → near-bg
    const PAL = [
      [235, 242, 248],  // 0 pale blue-white  (brightest)
      [160, 195, 220],  // 1 light slate
      [55,  95, 130],   // 2 muted blue
      [18,  30,  42],   // 3 dark navy
      [11,  12,  14],   // 4 near-background
    ];

    function sr(s) { const x = Math.sin(s * 127.1 + 311.7) * 43758.5; return x - Math.floor(x); }

    function getBrightness(col, row, COLS, ROWS) {
      // Glow blob centred lower-right so upper-left stays dark for text
      const nx = col / COLS;
      const ny = row / ROWS;
      const cx = 0.64, cy = 0.62;
      const dx = (nx - cx) * 1.3;
      const dy = (ny - cy) * 1.1;
      const dist = Math.sqrt(dx * dx + dy * dy);

      // Organic noise
      const n = sr(col * 0.31 + row * 0.17) * 0.26 - 0.13;
      return Math.max(0, 1 - (dist + n) / 0.85);
    }

    function palColor(brightness) {
      // Map brightness (0–1) onto the 5 palette stops
      const t = brightness;
      if (t > 0.82) return PAL[0];
      if (t > 0.60) return lerp3(PAL[1], PAL[0], (t - 0.60) / 0.22);
      if (t > 0.36) return lerp3(PAL[2], PAL[1], (t - 0.36) / 0.24);
      if (t > 0.14) return lerp3(PAL[3], PAL[2], (t - 0.14) / 0.22);
      return lerp3(PAL[4], PAL[3], t / 0.14);
    }

    function lerp3(a, b, t) {
      return [
        Math.round(a[0] + (b[0] - a[0]) * t),
        Math.round(a[1] + (b[1] - a[1]) * t),
        Math.round(a[2] + (b[2] - a[2]) * t),
      ];
    }

    function rgb(c) { return `rgb(${c[0]},${c[1]},${c[2]})`; }

    function drawPoster(W, H) {
      ctx.fillStyle = BG;
      ctx.fillRect(0, 0, W, H);

      const COLS = 28, ROWS = 34;

      // Non-uniform cell sizes for organic feel
      const rawC = Array.from({length: COLS}, (_, i) => 0.7 + sr(i * 41 + 1) * 0.7);
      const rawR = Array.from({length: ROWS}, (_, i) => 0.7 + sr(i * 59 + 2) * 0.7);
      const sumC = rawC.reduce((a, b) => a + b, 0);
      const sumR = rawR.reduce((a, b) => a + b, 0);

      let xp = [0]; rawC.forEach(w => xp.push(xp[xp.length-1] + (w/sumC) * W));
      let yp = [0]; rawR.forEach(h => yp.push(yp[yp.length-1] + (h/sumR) * H));

      // ── Pass 1: base cells ────────────────────────────
      const bloomCanvas = document.createElement('canvas');
      bloomCanvas.width = W; bloomCanvas.height = H;
      const bc = bloomCanvas.getContext('2d');
      bc.clearRect(0, 0, W, H);

      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const x = xp[c], y = yp[r];
          const cw = xp[c+1] - x, ch = yp[r+1] - y;
          const bri = getBrightness(c, r, COLS, ROWS);

          // Skip near-bg cells — let actual background show (seamless fade)
          if (bri < 0.04) continue;

          const col = palColor(bri);
          ctx.fillStyle = rgb(col);
          ctx.fillRect(x, y, cw, ch);

          // Scan lines — fine vertical stripes
          ctx.fillStyle = 'rgba(0,0,0,0.28)';
          for (let lx = x; lx < x + cw; lx += 3) {
            ctx.fillRect(lx, y, 1, ch);
          }

          // Bloom source: only bright cells go onto bloom layer
          if (bri > 0.42) {
            const alpha = (bri - 0.42) / 0.58;
            bc.fillStyle = `rgba(${col[0]},${col[1]},${col[2]},${alpha * 0.9})`;
            bc.fillRect(x, y, cw, ch);
          }
        }
      }

      // ── Pass 2: bloom composite ───────────────────────
      // Layer 1 — wide soft glow
      ctx.save();
      ctx.filter = 'blur(22px)';
      ctx.globalCompositeOperation = 'screen';
      ctx.globalAlpha = 0.55;
      ctx.drawImage(bloomCanvas, 0, 0);
      ctx.restore();

      // Layer 2 — tighter crisp halo
      ctx.save();
      ctx.filter = 'blur(7px)';
      ctx.globalCompositeOperation = 'screen';
      ctx.globalAlpha = 0.45;
      ctx.drawImage(bloomCanvas, 0, 0);
      ctx.restore();

      // ── Pass 3: edge fade to background ──────────────
      // Radial gradient: transparent center → solid BG at edges
      const fade = ctx.createRadialGradient(
        W * 0.62, H * 0.60, H * 0.10,   // inner circle (around the glow centre)
        W * 0.50, H * 0.50, H * 0.76    // outer circle
      );
      fade.addColorStop(0,   'rgba(10,10,10,0)');
      fade.addColorStop(0.55,'rgba(10,10,10,0.15)');
      fade.addColorStop(0.78,'rgba(10,10,10,0.62)');
      fade.addColorStop(1,   'rgba(10,10,10,1)');
      ctx.fillStyle = fade;
      ctx.fillRect(0, 0, W, H);

      // Extra dark mask over the text zone (upper-left)
      // so "Owen Kan" is always legible
      const textMask = ctx.createLinearGradient(0, 0, W * 0.52, H * 0.55);
      textMask.addColorStop(0,   'rgba(10,10,10,0.72)');
      textMask.addColorStop(0.5, 'rgba(10,10,10,0.18)');
      textMask.addColorStop(1,   'rgba(10,10,10,0)');
      ctx.fillStyle = textMask;
      ctx.fillRect(0, 0, W, H);
    }

    function setup() {
      const dpr = window.devicePixelRatio || 1;
      const W = canvas.offsetWidth;
      const H = canvas.offsetHeight;
      canvas.width  = W * dpr;
      canvas.height = H * dpr;
      ctx.scale(dpr, dpr);
      drawPoster(W, H);
    }

    setup();
    window.addEventListener('resize', () => {
      ctx.setTransform(1, 0, 0, 1, 0, 0); // reset scale before re-setup
      setup();
    });
  </script>

</body>
</html>
